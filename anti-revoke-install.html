<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Install Anti-Revoke Profile</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; color: #1c1c1e; margin: 0; padding: 40px 16px; text-align: center; }
    .card { max-width: 520px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 0 0 14px; color: #3a3a3c; line-height: 1.5; }
    a.btn { display: inline-block; margin-top: 8px; padding: 12px 18px; border-radius: 12px; background: #007aff; color: #fff; text-decoration: none; font-weight: 600; }
    .small { font-size: 14px; color: #6e6e73; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Install Anti-Revoke</h1>
    <p>Tap the button below to start profile installation.</p>
    <div id="actions"></div>
    <p class="small">If Telegram opens a download page, tap the link in Safari instead.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const profile = params.get('profile');
    const actions = document.getElementById('actions');
    if (!profile) {
      actions.innerHTML = '<p>Missing profile URL.</p>';
    } else {
      const btn = document.createElement('a');
      btn.className = 'btn';
      btn.href = profile;
      btn.textContent = 'Install Profile';
      actions.appendChild(btn);
      setTimeout(() => { window.location.href = profile; }, 600);
    }
  </script>
</body>
</html>
