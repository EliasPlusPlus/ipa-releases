<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Installing App…</title>
<style>
  body { font-family: -apple-system, sans-serif; text-align: center; padding: 60px 20px; background: #f2f2f7; }
  h1 { font-size: 24px; color: #1c1c1e; }
  p { color: #6c6c70; font-size: 16px; }
  a.btn { display: inline-block; margin-top: 20px; padding: 14px 32px; background: #007aff; color: #fff; border-radius: 12px; text-decoration: none; font-size: 17px; font-weight: 600; }
</style>
</head>
<body>
<h1>📲 Installing App</h1>
<p>Tap the button below to start installing on your iPhone or iPad.</p>
<script>
  var params = new URLSearchParams(window.location.search);
  var manifest = params.get("manifest");
  if (manifest) {
    var itms = "itms-services://?action=download-manifest&url=" + encodeURIComponent(manifest);
    var btn = document.createElement("a");
    btn.className = "btn";
    btn.href = itms;
    btn.textContent = "Install Now";
    document.body.appendChild(btn);
    setTimeout(function(){ window.location.href = itms; }, 800);
  } else {
    document.body.innerHTML = "<h1>Missing install target.</h1>";
  }
</script>
</body>
</html>
