<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Installing...</title>
</head>
<body>
  <p>Starting installation...</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const manifest = params.get('manifest');
    if (!manifest) {
      document.body.innerHTML = '<p>Missing manifest URL.</p>';
    } else {
      const itms = 'itms-services://?action=download-manifest&url=' + manifest;
      const key = 'ota_redirected_' + manifest;
      if (!sessionStorage.getItem(key)) {
        sessionStorage.setItem(key, '1');
        window.location.replace(itms);
      }
      document.body.innerHTML = '<p>If install did not start, <a href="' + itms + '">tap here</a>.</p>';
    }
  </script>
</body>
</html>
