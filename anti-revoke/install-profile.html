<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Install Anti Revoke Profile</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    .btn { display: inline-block; margin-top: 12px; padding: 10px 14px; border-radius: 10px; background: #111; color: #fff; text-decoration: none; }
    code { background: #f5f5f5; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h2>Install Anti Revoke Profile</h2>
  <div class="card">
    <p>This profile may help reduce revocations, but it is not guaranteed.</p>
    <p>If installation does not start automatically, open this page in <b>Safari</b> and tap the button below.</p>
    <a id="installBtn" class="btn" href="#">Install Profile</a>
    <p style="margin-top:12px;font-size:14px;color:#666">After download: open <code>Settings</code> > <code>Profile Downloaded</code> to finish install.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const profile = params.get('profile');
    const btn = document.getElementById('installBtn');
    if (!profile) {
      btn.textContent = 'Missing profile URL';
      btn.removeAttribute('href');
    } else {
      btn.href = profile;
      setTimeout(() => { window.location.href = profile; }, 300);
    }
  </script>
</body>
</html>
